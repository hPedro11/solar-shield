worker_processes 1;

events {
    worker_connections 1024;
}

http {
    # ============================================================
    # Rate Limiting Zones
    # 5 req/s para ingestao (operacao mais cara)
    # 20 req/s para alertas (leitura, mais permissivo)
    # ============================================================
    limit_req_zone $binary_remote_addr zone=ingest_zone:10m rate=5r/s;
    limit_req_zone $binary_remote_addr zone=alerts_zone:10m rate=20r/s;

    # Response quando rate limit eh atingido
    limit_req_status 429;

    # Upstreams (microsservicos)
    upstream ingestion_upstream {
        server ingestion-service:3001;
    }

    upstream alert_upstream {
        server alert-service:3002;
    }

    log_format main '$remote_addr - [$time_local] "$request" '
                    '$status $body_bytes_sent rt=$request_time';
    access_log /var/log/nginx/access.log main;

    server {
        listen 80;
        server_name _;

        # Health-check do gateway
        location /health {
            return 200 '{"gateway":"ok"}';
            add_header Content-Type application/json;
        }

        # ---- Ingestion (POST /api/ingest/...) ----
        location /api/ingest/ {
            limit_req zone=ingest_zone burst=5 nodelay;
            proxy_pass http://ingestion_upstream;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_connect_timeout 5s;
            proxy_read_timeout 30s;
        }

        # ---- Alerts (GET /api/alerts) ----
        location /api/alerts {
            limit_req zone=alerts_zone burst=10 nodelay;
            proxy_pass http://alert_upstream;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # Healthcheck dos servicos via gateway
        location /api/ingest/health {
            proxy_pass http://ingestion_upstream/health;
        }
        location /api/alerts/health {
            proxy_pass http://alert_upstream/health;
        }
    }
}
