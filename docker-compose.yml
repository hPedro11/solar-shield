services:
  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    container_name: solar-rabbitmq
    ports:
      - "5672:5672"      # AMQP
      - "15672:15672"    # Management UI
    environment:
      RABBITMQ_DEFAULT_USER: solar
      RABBITMQ_DEFAULT_PASS: shield
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - solar-net

  redis:
    image: redis:7-alpine
    container_name: solar-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - solar-net

  ingestion-service:
    build: ./services/ingestion-service
    container_name: solar-ingestion
    environment:
      PORT: 3001
      RABBITMQ_URL: amqp://solar:shield@rabbitmq:5672
      NASA_API_KEY: ${NASA_API_KEY:-DEMO_KEY}
      NASA_BASE_URL: https://api.nasa.gov/DONKI
    depends_on:
      rabbitmq:
        condition: service_healthy
    networks:
      - solar-net

  alert-service:
    build: ./services/alert-service
    container_name: solar-alerts
    environment:
      PORT: 3002
      RABBITMQ_URL: amqp://solar:shield@rabbitmq:5672
      REDIS_URL: redis://redis:6379
    depends_on:
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - solar-net

  nginx:
    image: nginx:1.27-alpine
    container_name: solar-gateway
    ports:
      - "8080:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - ingestion-service
      - alert-service
    networks:
      - solar-net

networks:
  solar-net:
    driver: bridge
